name: diffusion
# Role: Diffusion Policy training + inference + DP-side optimizations.
# Owned by: Yuva.
# Install: conda env create -f envs/diffusion.yml
#          conda activate diffusion
# The upstream repo (/srv/240d/repos/diffusion_policy) also has conda_environment.yaml;
# this file is a lean version focused on our needs (no full robosuite/pymunk if the demo skips it).
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - libxkbcommon
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.4.1
      - torchvision==0.19.1
      # Diffusion + generative stack
      - diffusers==0.31.0
      - einops
      - hydra-core==1.3.2              # DP config system
      - omegaconf==2.3.0
      # DP data format + utilities
      - zarr==2.18.3
      - numcodecs
      - threadpoolctl
      - shapely                        # Push-T geometry
      # Simulation — keep available for LIBERO/Push-T eval
      - mujoco==3.2.5
      - gymnasium==1.0.0
      - dm-control
      # Profiling helpers
      - nvtx==0.2.10
      # Logging
      - wandb
      # Utilities
      - numpy<2.0
      - pillow
      - opencv-python-headless
      - scipy
      - tqdm
      - rich
      - matplotlib
      - pandas
